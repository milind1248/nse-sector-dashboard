version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: python run.py dashboard
    restart: unless-stopped

  scheduler:
    build: .
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: python run.py schedule
    restart: unless-stopped
    depends_on:
      - dashboard
