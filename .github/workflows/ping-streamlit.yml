name: Ping Streamlit App

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Chromium
        run: sudo apt-get install -y chromium-browser

      - name: Wake Streamlit app via headless browser
        run: |
          chromium-browser \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --disable-dev-shm-usage \
            --timeout=25000 \
            https://marketsector.streamlit.app/ || true
          echo "Ping done"
